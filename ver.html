<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Postal - La Chipa Viajera</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dorado: #d97706;
            --dorado-oscuro: #b45309;
            --crema: #fdf6e3;
            --crema-oscuro: #f4edd2;
            --texto: #3a2c1a;
            --texto-suave: #7a6a55;
            --borde: #e0d5c0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--crema-oscuro);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px 16px 40px;
            color: var(--texto);
        }

        .container {
            max-width: 560px;
            width: 100%;
            background: white;
            padding: 28px 24px;
            border-radius: 24px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.12);
        }

        /* ── HEADER ── */
        .header-logo { text-align: center; margin-bottom: 24px; }
        
        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--dorado);
            font-size: 24px;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        /* ── AVISO DE PREVIEW ── */
        .aviso-preview {
            background: #eff6ff;
            border: 2px dashed #3b82f6;
            color: #1e40af;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* ── CONTENEDOR POSTAL (Alineación corregida) ── */
        .postal-preview-wrap {
            position: relative;
            margin-bottom: 24px;
            border-radius: 16px;
            overflow: hidden;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .postal-en-grande {
            width: 100%;
            height: auto;
            display: block;
        }

        .estampilla-sobre-postal {
            position: absolute;
            top: 24px;
            right: 26px;
            width: 72px;
            height: auto;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
            pointer-events: none;
        }

        /* ── BLOQUE DEDICATORIA ── */
        .bloque-dedicatoria {
            background: var(--crema);
            border: 2px solid var(--borde);
            border-radius: 16px;
            padding: 20px;
            position: relative;
        }

        .saludo-para {
            font-size: 15px;
            color: var(--texto-suave);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .saludo-para strong {
            color: var(--texto);
            font-size: 18px;
        }

        .mensaje-cuerpo {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            line-height: 1.6;
            color: var(--texto);
            font-style: italic;
            margin-bottom: 20px;
            white-space: pre-wrap;
        }

        .firma-de {
            font-size: 15px;
            color: var(--texto);
            font-weight: 700;
            text-align: left;
        }

        /* ── BOTÓN CREAR PROPIA ── */
        .btn-crear {
            display: block;
            width: 100%;
            padding: 14px;
            background: var(--dorado);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            margin-top: 24px;
            box-shadow: 0 4px 14px rgba(217,119,6,0.3);
            transition: all 0.2s;
        }
        .btn-crear:hover { background: var(--dorado-oscuro); transform: translateY(-1px); }

        /* ── ESTADOS ERROR/OCULTO ── */
        .error-box {
            text-align: center;
            padding: 40px 20px;
        }
        .error-box h2 { color: #dc2626; margin-bottom: 10px; }
        .oculto { display: none !important; }
    </style>
</head>
<body>
<div class="container">

    <!-- Aviso exclusivo si entra desde el botón "Ver cómo queda" -->
    <div id="borde-aviso-preview" class="aviso-preview oculto">
        Vista previa de tu postal. Así la va a ver el destinatario.
    </div>

    <!-- Bloque Principal de Visualización -->
    <div id="bloque-postal">
        <div class="header-logo">
            <h1>Te llegó una postal de La Chipa Viajera</h1>
        </div>

        <div class="postal-preview-wrap">
            <img id="vista-postal-grande" src="" class="postal-en-grande" alt="Postal">
            <img id="estampilla-preview" src="" class="estampilla-sobre-postal oculto" alt="Estampilla">
        </div>

        <div class="bloque-dedicatoria">
            <div class="saludo-para">Para: <strong id="txt-para"></strong></div>
            <div class="mensaje-cuerpo" id="txt-mensaje"></div>
            <div class="firma-de" id="txt-de"></div>
        </div>

        <a href="index.html" class="btn-crear">Enviá tu propia postal aquí</a>
    </div>

    <!-- Bloque de resguardo por si se rompe el parámetro o no existe -->
    <div id="bloque-error" class="error-box oculto">
        <h2>No pudimos cargar la postal</h2>
        <p>El enlace parece estar incompleto o modificado.</p>
        <a href="index.html" class="btn-crear" style="margin-top:20px">Ir a crear una postal</a>
    </div>

</div>

<script>
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    window.onload = function() {
        const payload = getQueryParam('d');
        const origen  = getQueryParam('origen');

        // Si viene del botón de prueba del index, mostramos el cartel azul superior
        if (origen === 'preview') {
            document.getElementById('borde-aviso-preview').classList.remove('oculto');
        }

        if (!payload) {
            mostrarError();
            return;
        }

        try {
            // Decodificación segura tolerante a caracteres especiales y emojis en la dedicatoria
            const jsonString = decodeURIComponent(escape(atob(payload)));
            const datos = JSON.parse(jsonString);

            // 1. Renderizar la imagen base de la postal
            const imgPostal = document.getElementById('vista-postal-grande');
            imgPostal.src = "imagenes/" + datos.postal + ".jpg";
            imgPostal.onerror = function() {
                this.src = "https://placehold.co/500x320/f4edd2/d97706?text=Postal+No+Encontrada";
            };

            // 2. Renderizar y encajar la estampilla elegida
            if (datos.estampilla) {
                const imgEstampilla = document.getElementById('estampilla-preview');
                imgEstampilla.src = "imagenes/" + datos.estampilla + ".png";
                imgEstampilla.classList.remove('oculto');
            }

            // 3. Inyectar los textos sanitizados dentro de la estructura de la dedicatoria
            document.getElementById('txt-para').innerText = datos.para || '';
            document.getElementById('txt-mensaje').innerText = datos.msg || '';
            
            if (datos.de) {
                document.getElementById('txt-de').innerText = "Con carino, " + datos.de;
            } else {
                document.getElementById('txt-de').classList.add('oculto');
            }

        } catch (e) {
            console.error("Error al decodificar la postal:", e);
            mostrarError();
        }
    };

    function mostrarError() {
        document.getElementById('bloque-postal').classList.add('oculto');
        document.getElementById('bloque-error').classList.remove('oculto');
    }
</script>
</body>
</html>
