<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu postal de La Chipa Viajera ✈️</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dorado: #d97706;
            --dorado-claro: #fef3c7;
            --crema: #fdf6e3;
            --crema-oscuro: #f4edd2;
            --texto: #3a2c1a;
            --texto-suave: #7a6a55;
            --verde-wa: #25D366;
            --verde-wa-oscuro: #128C7E;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--crema-oscuro);
            background-image:
                radial-gradient(ellipse at top left, rgba(217,119,6,0.10) 0%, transparent 55%),
                radial-gradient(ellipse at bottom right, rgba(217,119,6,0.07) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            color: var(--texto);
        }

        /* ── TARJETA PRINCIPAL ── */
        .postal-card {
            max-width: 520px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow:
                0 20px 60px rgba(0,0,0,0.13),
                0 4px 16px rgba(0,0,0,0.07);
            overflow: hidden;
            animation: aparecerCard 0.6s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes aparecerCard {
            from { opacity: 0; transform: scale(0.94) translateY(18px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* IMAGEN */
        .postal-imagen-wrap {
            position: relative;
            background: #f3f0e8;
        }

        .postal-imagen {
            width: 100%;
            display: block;
            max-height: 300px;
            object-fit: contain;
            background: #f3f0e8;
        }

        /* SELLO DECORATIVO */
        .sello {
            position: absolute;
            top: 14px;
            right: 14px;
            background: var(--dorado);
            color: white;
            font-family: 'Playfair Display', serif;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 6px 10px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            line-height: 1.4;
            text-align: center;
            animation: aparecerSello 0.4s 0.5s ease both;
        }

        @keyframes aparecerSello {
            from { opacity: 0; transform: scale(0.6) rotate(-5deg); }
            to   { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        /* CUERPO DE LA POSTAL */
        .postal-cuerpo {
            padding: 28px 28px 24px;
        }

        /* ENCABEZADO CHIPA */
        .chipa-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 18px;
            border-bottom: 2px dashed var(--crema-oscuro);
        }

        .chipa-avatar {
            width: 54px;
            max-width: 54px;
            height: 54px;
            max-height: 54px;
            object-fit: contain;
            flex-shrink: 0;
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.15));
        }

        .chipa-header-texto h2 {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            color: var(--dorado);
            margin-bottom: 2px;
        }

        .chipa-header-texto p {
            font-size: 12px;
            color: var(--texto-suave);
        }

        /* MENSAJE */
        .label-postal {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--texto-suave);
            margin-bottom: 6px;
        }

        .destinatario {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            color: var(--texto);
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .burbuja-mensaje {
            background: var(--crema);
            border-left: 4px solid var(--dorado);
            border-radius: 0 14px 14px 0;
            padding: 14px 18px;
            margin-bottom: 18px;
        }

        .burbuja-mensaje p {
            font-size: 15px;
            line-height: 1.6;
            color: var(--texto);
            font-style: italic;
        }

        .firma {
            font-size: 13px;
            color: var(--texto-suave);
            text-align: right;
            font-weight: 700;
        }

        /* FOOTER ACCIONES */
        .postal-footer {
            background: var(--crema);
            border-top: 2px solid var(--crema-oscuro);
            padding: 20px 28px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-reenviar {
            width: 100%;
            padding: 14px;
            background: var(--verde-wa);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(37,211,102,0.3);
            transition: all 0.2s;
        }

        .btn-reenviar:hover {
            background: var(--verde-wa-oscuro);
            transform: translateY(-1px);
        }

        .btn-crear {
            width: 100%;
            padding: 13px;
            background: white;
            color: var(--dorado);
            border: 2px solid var(--dorado);
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-crear:hover {
            background: var(--dorado-claro);
        }

        /* ESTADO DE ERROR */
        .error-estado {
            text-align: center;
            padding: 40px 28px;
        }

        .error-estado h2 {
            font-family: 'Playfair Display', serif;
            color: var(--dorado);
            font-size: 22px;
            margin-bottom: 10px;
        }

        .error-estado p {
            color: var(--texto-suave);
            font-size: 14px;
            line-height: 1.6;
        }

        /* PIE DE PÁGINA */
        footer {
            margin-top: 20px;
            font-size: 12px;
            color: var(--texto-suave);
            text-align: center;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="postal-card">

    <!-- Imagen de la postal -->
    <div class="postal-imagen-wrap">
        <img id="img-postal" class="postal-imagen" src="" alt="Postal">
        <div class="sello">La Chipa<br>Viajera ✈️</div>
    </div>

    <!-- Cuerpo del mensaje -->
    <div class="postal-cuerpo" id="cuerpo-postal">

        <div class="chipa-header">
            <img
                src="imagenes/Chipa Viajera con maletas1.png"
                alt="La Chipa Viajera"
                class="chipa-avatar"
                onerror="this.style.display='none'"
            >
            <div class="chipa-header-texto">
                <h2>La Chipa Viajera</h2>
                <p>Te envió una postal personalizada 💛</p>
            </div>
        </div>

        <div class="label-postal">Para:</div>
        <div class="destinatario" id="texto-para">—</div>

        <div class="burbuja-mensaje">
            <p id="texto-mensaje">...</p>
        </div>

        <div class="firma" id="texto-firma"></div>

    </div>

</div>

<!-- Botones de acción -->
<div class="postal-card" style="margin-top:14px; background:var(--crema); box-shadow:none; border:2px solid var(--crema-oscuro);">
    <div class="postal-footer">
        <button class="btn-reenviar" onclick="compartirWhatsApp()">
            📤 Reenviar esta postal por WhatsApp
        </button>
        <button class="btn-crear" onclick="irACrear()">
            🌍 Crear mi propia postal
        </button>
    </div>
</div>

<footer>La Chipa Viajera · Hecha con 🧀 y mucho cariño</footer>

<script>
    // ══════════════════════════════════════════════════════
    //  Lee los parámetros de la URL y los muestra
    //  Parámetros esperados:
    //    ?postal=id_de_postal
    //    &para=NombreDestinatario
    //    &de=NombreRemitente     (opcional)
    //    &msg=TextoDelMensaje
    // ══════════════════════════════════════════════════════

    const params = new URLSearchParams(window.location.search);

    const idPostal = params.get('postal') || '';
    const para     = params.get('para')   || '';
    const de       = params.get('de')     || '';
    const mensaje  = params.get('msg')    || '';

    // ── Imagen ──
    if (idPostal) {
        const imgEl = document.getElementById('img-postal');
        const rutaImg = `imagenes/${idPostal}.jpg`;
        const placeholder = `https://placehold.co/520x300/f4edd2/d97706?text=La+Chipa+Viajera`;
        imgEl.src = rutaImg;
        imgEl.onerror = function() { this.src = placeholder; };
    }

    // ── Destinatario ──
    if (para) {
        document.getElementById('texto-para').textContent = `¡Hola, ${para}!`;
    } else {
        document.getElementById('texto-para').textContent = '¡Hola, viajero/a!';
    }

    // ── Mensaje ──
    if (mensaje) {
        document.getElementById('texto-mensaje').textContent = mensaje;
    } else {
        document.getElementById('texto-mensaje').textContent = '¡La Chipa Viajera te manda todo su cariño desde el mundo! 🌍';
    }

    // ── Firma ──
    if (de) {
        document.getElementById('texto-firma').textContent = `— Con cariño, ${de} 💛`;
    }

    // ══════════════════════════════════════════════════════
    //  COMPARTIR POR WHATSAPP (reenviar la misma URL)
    // ══════════════════════════════════════════════════════
    function compartirWhatsApp() {
        const urlActual = window.location.href;
        const texto =
            `¡Mirá esta postal de *La Chipa Viajera* que me llegó! 🌍✈️%0A%0A` +
            `👉 ${urlActual}`;
        window.open(`https://wa.me/?text=${texto}`, '_blank');
    }

    // ══════════════════════════════════════════════════════
    //  IR A CREAR UNA POSTAL NUEVA
    // ══════════════════════════════════════════════════════
    function irACrear() {
        window.location.href = 'index.html';
    }
</script>

</body>
</html>
