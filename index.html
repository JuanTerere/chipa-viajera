<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Chipa Viajera - Postales del Mundo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dorado: #d97706;
            --dorado-oscuro: #b45309;
            --crema: #fdf6e3;
            --crema-oscuro: #f4edd2;
            --verde-wa: #25D366;
            --verde-wa-oscuro: #128C7E;
            --texto: #3a2c1a;
            --texto-suave: #7a6a55;
            --borde: #e0d5c0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--crema-oscuro);
            background-image:
                radial-gradient(circle at 20% 50%, rgba(217,119,6,0.07) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(217,119,6,0.05) 0%, transparent 40%);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
            color: var(--texto);
        }

        .container {
            max-width: 560px;
            width: 100%;
            background: white;
            padding: 30px 28px;
            border-radius: 24px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
            margin: 0 auto;
        }

        /* ENCABEZADO */
        .header-logo {
            text-align: center;
            margin-bottom: 18px;
        }

        .chipa-logo {
            width: 140px !important;
            max-width: 140px !important;
            height: 140px !important;
            max-height: 140px !important;
            display: block;
            margin: 0 auto 14px;
            object-fit: contain;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.15));
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--dorado);
            font-size: 24px;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        p.bajada {
            color: var(--texto-suave);
            font-size: 14px;
            line-height: 1.5;
        }

        /* SEPARADORES DE SECCIÓN */
        h3.seccion-titulo {
            color: var(--dorado);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin: 22px 0 10px 0;
            padding-bottom: 6px;
            border-bottom: 2px solid var(--crema-oscuro);
        }

        /* SELECTOR DE PAÍS */
        .menu-paises {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 6px;
        }

        .btn-pais {
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            border: 2px solid var(--borde);
            border-radius: 10px;
            background: var(--crema);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--texto);
        }

        .btn-pais:hover {
            background: var(--crema-oscuro);
            border-color: var(--dorado);
        }

        .btn-pais.activo {
            background: var(--dorado);
            color: white;
            border-color: var(--dorado-oscuro);
            box-shadow: 0 3px 10px rgba(217,119,6,0.3);
        }

        /* GALERÍA DE POSTALES */
        .galeria-postales {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 10px;
        }

        .tarjeta-postal {
            border: 2px solid var(--borde);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--crema);
        }

        .tarjeta-postal img {
            width: 100%;
            display: block;
            height: 120px;
            object-fit: contain;
            background-color: #f3f4f6;
            padding: 6px;
        }

        .tarjeta-postal p {
            margin: 6px 8px 10px;
            font-size: 12px;
            font-weight: 700;
            color: var(--texto-suave);
            text-align: center;
            line-height: 1.3;
        }

        .tarjeta-postal:hover {
            border-color: var(--dorado);
            box-shadow: 0 4px 14px rgba(217,119,6,0.2);
            transform: translateY(-2px);
        }

        /* BLOQUE PERSONALIZAR */
        .btn-volver {
            background: none;
            border: none;
            color: var(--texto-suave);
            font-size: 13px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 0;
            margin-bottom: 14px;
        }

        .btn-volver:hover { color: var(--dorado); }

        .postal-en-grande {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
            margin-bottom: 18px;
            object-fit: contain;
            background: #f3f4f6;
            min-height: 180px;
        }

        /* FORMULARIO */
        .campo-grupo { margin-bottom: 10px; }

        .campo-grupo label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--texto-suave);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        input, textarea {
            width: 100%;
            padding: 11px 14px;
            border: 2px solid var(--borde);
            border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            color: var(--texto);
            background: var(--crema);
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            border-color: var(--dorado);
            outline: none;
            background: white;
        }

        textarea { resize: vertical; min-height: 80px; }

        /* BOTONES DE ACCIÓN */
        .btn-whatsapp {
            width: 100%;
            padding: 15px;
            background: var(--verde-wa);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 16px;
            box-shadow: 0 4px 14px rgba(37,211,102,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .btn-whatsapp:hover {
            background: var(--verde-wa-oscuro);
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(37,211,102,0.4);
        }

        .btn-preview {
            width: 100%;
            padding: 12px;
            background: white;
            color: var(--dorado);
            border: 2px solid var(--dorado);
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
        }

        .btn-preview:hover {
            background: var(--crema);
            transform: translateY(-1px);
        }

        /* ANIMACIÓN DE ENTRADA */
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .animar { animation: fadeSlideIn 0.35s ease both; }

        .oculto { display: none !important; }
    </style>
</head>
<body>

<div class="container">

    <!-- ══════════════════════════════════════════
         BLOQUE 1: SELECCIÓN DE PAÍS Y POSTAL
    ══════════════════════════════════════════ -->
    <div id="bloque-seleccion">

        <div class="header-logo">
            <!-- 
                IMAGEN: asegurate de que el archivo se llame exactamente así en tu carpeta /imagenes/
                Si el nombre tiene espacios, GitHub los respeta si subiste el archivo con esos espacios.
            -->
            <img
                src="imagenes/Chipa Viajera con maletas1.png"
                alt="La Chipa Viajera"
                class="chipa-logo"
                onerror="this.style.display='none'"
            >
            <h1>Enviá una postal de la Chipa Viajera 🌍</h1>
            <p class="bajada">Hacé que la Chipa Viajera lleve tu saludo a cualquier parte del mundo.</p>
        </div>

        <h3 class="seccion-titulo">¿Desde qué país viaja la Chipa?</h3>
        <div class="menu-paises" id="menu-paises">
            <!-- Los botones se generan automáticamente desde albumesPaises -->
        </div>

        <div id="seccion-album" class="oculto">
            <h3 class="seccion-titulo">Elegí el lugar icónico de tu postal</h3>
            <div class="galeria-postales" id="contenedor-postales"></div>
        </div>

    </div>

    <!-- ══════════════════════════════════════════
         BLOQUE 2: PERSONALIZACIÓN Y ENVÍO
    ══════════════════════════════════════════ -->
    <div id="bloque-personalizar" class="oculto">

        <button type="button" class="btn-volver" onclick="volverAlCatalogo()">⬅️ Cambiar de postal</button>

        <img id="vista-postal-grande" src="" class="postal-en-grande" alt="Postal Seleccionada">

        <div class="campo-grupo">
            <label for="nombre-para">¿Para quién es la postal?</label>
            <input type="text" id="nombre-para" placeholder="Ej: Carlos">
        </div>

        <div class="campo-grupo">
            <label for="nombre-de">¿De parte de quién?</label>
            <input type="text" id="nombre-de" placeholder="Ej: María">
        </div>

        <div class="campo-grupo">
            <label for="mensaje-dedicatoria">Tu mensaje o dedicatoria</label>
            <textarea id="mensaje-dedicatoria" rows="3" placeholder="Ej: ¡Te mando un abrazo desde París! Que la Chipa Viajera reviva el amor a nuestra patria 🧀🇵🇾"></textarea>
        </div>

        <button type="button" class="btn-whatsapp" onclick="enviarPorWhatsApp()">
            🚀 Enviar por WhatsApp
        </button>

        <button type="button" class="btn-preview" onclick="probarVista()">
            👁️ Así quedaría esta postal
        </button>

    </div>

</div>

<script>
    // ══════════════════════════════════════════════════════
    //  CONFIGURACIÓN PRINCIPAL
    //  Cambiá esta URL cuando tengas tu dominio en GitHub Pages
    // ══════════════════════════════════════════════════════
    const URL_BASE = "https://juanterere.github.io/chipa-viajera";

    // ══════════════════════════════════════════════════════
    //  ÁLBUM DE POSTALES
    //  Para agregar más países/ciudades, simplemente añadí
    //  un nuevo bloque dentro de albumesPaises siguiendo
    //  el mismo formato. El ID de la postal es el nombre
    //  del archivo de imagen SIN extensión.
    //
    //  Estructura de cada entrada:
    //  { id: "nombre_archivo_sin_extension", lugar: "Texto que aparece en la tarjeta" }
    //
    //  La imagen debe estar en: imagenes/nombre_archivo.jpg
    // ══════════════════════════════════════════════════════
    const albumesPaises = {

        francia: {
            bandera: "🇫🇷",
            nombre: "Francia",
            postales: [
                { id: "fr_paris_torre",      lugar: "París · Torre Eiffel" },
                { id: "fr_paris_louvre",     lugar: "París · Museo del Louvre" },
                { id: "fr_paris_concordia",  lugar: "París · Plaza de la Concordia" },
                // ← Agregá más postales de Francia acá
            ]
        },

        espana: {
            bandera: "🇪🇸",
            nombre: "España",
            postales: [
                { id: "es_madrid_plazamayor", lugar: "Madrid · Plaza Mayor" },
                { id: "es_barcelona_sagrada",  lugar: "Barcelona · Sagrada Familia" },
                // ← Agregá más postales de España acá
            ]
        },

        italia: {
            bandera: "🇮🇹",
            nombre: "Italia",
            postales: [
                { id: "it_roma_coliseo",     lugar: "Roma · Coliseo" },
                { id: "it_venecia_canal",    lugar: "Venecia · Gran Canal" },
                // ← Agregá más postales de Italia acá
            ]
        },

        // ══════════════════════════════════════════════════
        //  ← PARA AGREGAR UN NUEVO PAÍS, copiá este bloque:
        //
        //  nuevo_pais: {
        //      bandera: "🏳️",
        //      nombre: "Nombre del País",
        //      postales: [
        //          { id: "xx_ciudad_lugar", lugar: "Ciudad · Lugar Icónico" },
        //      ]
        //  },
        // ══════════════════════════════════════════════════

    };

    // ══════════════════════════════════════════════════════
    //  ESTADO DE LA APLICACIÓN
    // ══════════════════════════════════════════════════════
    let paisActivo = "";
    let postalSeleccionada = "";

    // ══════════════════════════════════════════════════════
    //  INICIALIZACIÓN: genera los botones de países
    //  automáticamente desde albumesPaises
    // ══════════════════════════════════════════════════════
    function inicializar() {
        const menuPaises = document.getElementById('menu-paises');
        menuPaises.innerHTML = "";

        Object.keys(albumesPaises).forEach(clave => {
            const pais = albumesPaises[clave];
            const btn = document.createElement('button');
            btn.type = "button";
            btn.className = "btn-pais";
            btn.id = `pais-${clave}`;
            btn.innerHTML = `${pais.bandera} ${pais.nombre}`;
            btn.onclick = () => cargarAlbumPais(clave);
            menuPaises.appendChild(btn);
        });
    }

    // ══════════════════════════════════════════════════════
    //  CARGA EL ÁLBUM DEL PAÍS SELECCIONADO
    // ══════════════════════════════════════════════════════
    function cargarAlbumPais(clave) {
        paisActivo = clave;
        postalSeleccionada = "";

        // Marcar botón activo
        document.querySelectorAll('.btn-pais').forEach(btn => btn.classList.remove('activo'));
        document.getElementById(`pais-${clave}`).classList.add('activo');

        const contenedor = document.getElementById('contenedor-postales');
        contenedor.innerHTML = "";

        const pais = albumesPaises[clave];

        pais.postales.forEach(postal => {
            const rutaImg = `imagenes/${postal.id}.jpg`;
            const placeholder = `https://placehold.co/500x320/f4edd2/d97706?text=${encodeURIComponent(postal.lugar)}`;

            const div = document.createElement('div');
            div.className = "tarjeta-postal animar";
            div.innerHTML = `
                <img src="${rutaImg}" alt="${postal.lugar}" onerror="this.src='${placeholder}'">
                <p>${postal.lugar}</p>
            `;
            div.onclick = () => seleccionarPostal(postal.id, rutaImg, placeholder, postal.lugar);
            contenedor.appendChild(div);
        });

        document.getElementById('seccion-album').classList.remove('oculto');
    }

    // ══════════════════════════════════════════════════════
    //  SELECCIÓN DE POSTAL → muestra bloque personalizar
    // ══════════════════════════════════════════════════════
    function seleccionarPostal(idPostal, rutaImg, placeholder, nombreLugar) {
        postalSeleccionada = idPostal;

        const imgGrande = document.getElementById('vista-postal-grande');
        imgGrande.src = rutaImg;
        imgGrande.alt = nombreLugar;
        imgGrande.onerror = function() { this.src = placeholder; };

        document.getElementById('bloque-seleccion').classList.add('oculto');
        document.getElementById('bloque-personalizar').classList.remove('oculto');
        document.getElementById('bloque-personalizar').classList.add('animar');

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ══════════════════════════════════════════════════════
    //  VOLVER AL CATÁLOGO
    // ══════════════════════════════════════════════════════
    function volverAlCatalogo() {
        document.getElementById('bloque-personalizar').classList.add('oculto');
        document.getElementById('bloque-seleccion').classList.remove('oculto');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ══════════════════════════════════════════════════════
    //  VALIDACIÓN COMÚN DE FORMULARIO
    // ══════════════════════════════════════════════════════
    function obtenerDatosFormulario() {
        const para    = document.getElementById('nombre-para').value.trim();
        const de      = document.getElementById('nombre-de').value.trim();
        const mensaje = document.getElementById('mensaje-dedicatoria').value.trim();

        if (!postalSeleccionada) {
            alert("¡Seleccioná una postal primero!");
            return null;
        }
        if (!para) {
            alert("¡Escribí el nombre de quien recibe la postal!");
            return null;
        }
        if (!mensaje) {
            alert("¡Escribí tu mensaje o dedicatoria!");
            return null;
        }

        return { para, de, mensaje };
    }

    // ══════════════════════════════════════════════════════
    //  ENVIAR POR WHATSAPP (producción)
    // ══════════════════════════════════════════════════════
    function enviarPorWhatsApp() {
        const datos = obtenerDatosFormulario();
        if (!datos) return;

        const { para, de, mensaje } = datos;

        // ── Codificamos los datos en Base64 ──
        // Esto evita que WhatsApp corte la URL por los & de los parámetros.
        // Base64 solo usa letras, números, +, / y = — ninguno rompe una URL.
        const payload = btoa(unescape(encodeURIComponent(JSON.stringify({
            postal: postalSeleccionada,
            para:   para,
            de:     de,
            msg:    mensaje
        }))));

        const urlPostal = URL_BASE + '/ver.html?d=' + payload;

        // ── Texto del mensaje de WhatsApp ──
        const firma = de ? '%0A%0A— Con cariño, *' + de + '* 💛' : '';
        const textoWA =
            '¡Hola *' + para + '*! 👋✈️%0A%0A' +
            'Te llegó una postal personalizada de *La Chipa Viajera* desde el mundo.%0A%0A' +
            '_"' + encodeURIComponent(mensaje) + '"_' + firma + '%0A%0A' +
            '👉 Mirá tu postal acá:%0A' + encodeURIComponent(urlPostal);

        window.open('https://wa.me/?text=' + textoWA, '_blank');
    }

    // ══════════════════════════════════════════════════════
    //  VISTA PREVIA LOCAL (para probar en tu PC)
    // ══════════════════════════════════════════════════════
    function probarVista() {
        const datos = obtenerDatosFormulario();
        if (!datos) return;

        const { para, de, mensaje } = datos;

        const payload = btoa(unescape(encodeURIComponent(JSON.stringify({
            postal: postalSeleccionada,
            para:   para,
            de:     de,
            msg:    mensaje
        }))));

        window.location.href = 'ver.html?d=' + payload;
    }

    // ══════════════════════════════════════════════════════
    //  ARRANCAR
    // ══════════════════════════════════════════════════════
    inicializar();
</script>

</body>
</html>
