<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chipa Viajera: Montmartre Pro</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body {
            margin: 0; padding: 0; background-color: #000;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Arial', sans-serif; height: 100vh; overflow: hidden;
        }
        #game-container {
            position: relative; width: 100%; max-width: 420px; height: 100vh;
            background: #000; display: flex; flex-direction: column;
        }
        #ui-layer {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; color: white; font-weight: bold; font-size: 13px;
            z-index: 10; background: rgba(0, 0, 0, 0.85);
            border-bottom: 1px solid #333; gap: 8px;
        }
        #hud-cocidos { white-space: nowrap; color: #f1c40f; }
        #hud-players { white-space: nowrap; color: #5dade2; }
        canvas { flex-grow: 1; width: 100%; background: #000; image-rendering: pixelated; }
        
        #level-banner {
            position: absolute; top: 15%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-family: 'Courier New', Courier, monospace; font-size: 32px;
            font-weight: bold; text-shadow: 3px 3px 0px #ff0055, -3px -3px 0px #00ffcc;
            z-index: 20; pointer-events: none; opacity: 0; transition: opacity 0.5s ease;
            text-align: center; width: 100%; letter-spacing: 2px;
        }
        #loading-screen {
            position: absolute; inset: 0; background: #000; color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Courier New', Courier, monospace; font-size: 18px;
            z-index: 40; letter-spacing: 2px;
        }

        /* Modales de Interfaz */
        .modal-screen {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 88%; max-height: 85%;
            background: rgba(15, 15, 25, 0.98); border: 3px solid #ff0055;
            border-radius: 12px; padding: 22px 15px; text-align: center;
            color: #fff; z-index: 30; box-shadow: 0px 0px 25px rgba(255, 0, 85, 0.5);
            flex-direction: column; overflow-y: auto;
        }
        .go-title {
            font-family: 'Courier New', Courier, monospace; font-size: 22px;
            font-weight: bold; color: #ff0055; margin-bottom: 12px; line-height: 1.3;
        }
        .score-highlight { color: #f1c40f; font-weight: bold; font-size: 22px; display: block; margin: 8px 0; }
        
        .go-input, .go-select {
            padding: 10px; width: 100%; margin-bottom: 12px; border-radius: 6px;
            border: 1px solid #555; background: #222; color: #fff; text-align: center; font-size: 15px;
        }
        .go-btn {
            display: block; width: 100%; padding: 11px; margin: 6px 0;
            border: none; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer;
        }
        .btn-whatsapp { background-color: #25D366; color: #fff; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .btn-cert { background-color: #00ffcc; color: #000; }
        .btn-rank { background-color: #2980b9; color: #fff; }
        .btn-restart { background-color: #444; color: #fff; margin-top: 10px; }

        /* Estilos de la tabla de Ranking */
        #rankingList { list-style: none; padding: 0; margin: 15px 0; text-align: left; }
        #rankingList li {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 10px; border-bottom: 1px solid #333; font-size: 14px;
        }
        #rankingList li:nth-child(1) { color: #f1c40f; font-weight: bold; font-size: 16px; }
        .rank-item-left { display: flex; gap: 8px; align-items: center; }
        .rank-pos { width: 24px; font-weight: bold; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div id="hud-stats-left">Nivel: 1 | Puntos: 0</div>
            <div id="hud-players">Mundo: <span id="playerCount">...</span> 🌍</div>
            <div id="hud-cocidos">☕ 0/10</div>
            <div id="hud-lives">❤️ x3</div>
        </div>
        <div id="level-banner">NIVEL 1</div>
        <div id="loading-screen">CARGANDO... 🥮</div>

        <div id="game-over-screen" class="modal-screen">
            <div id="go-title" class="go-title">Cargando resultado...</div>
            <div id="go-stats">
                <span class="score-highlight" id="final-score">Puntos: 0</span>
            </div>
            
            <input type="text" id="playerName" class="go-input" placeholder="Tu Nombre / Votre Nom" maxlength="12">
            
            <select id="playerCountry" class="go-select">
                <option value="🇵🇾">Paraguay (🇵🇾)</option>
                <option value="🇫🇷">France (🇫🇷)</option>
                <option value="🇦🇷">Argentina (🇦🇷)</option>
                <option value="🇧🇷">Brasil (🇧🇷)</option>
                <option value="🇪🇸">España (🇪🇸)</option>
                <option value="🇺🇸">USA (🇺🇸)</option>
                <option value="🇺🇾">Uruguay (🇺🇾)</option>
                <option value="🇨🇱">Chile (🇨🇱)</option>
                <option value="🇲🇽">México (🇲🇽)</option>
                <option value="🇨🇴">Colombia (🇨🇴)</option>
                <option value="🇧🇪">Belgique (🇧🇪)</option>

            <button id="btnSaveRank" class="go-btn btn-rank">📊 Guardar y Ver Ranking</button>
            <a id="btnShareWA" class="go-btn btn-whatsapp" href="#" target="_blank">📲 Compartir en WhatsApp</a>
            <button id="btnDownloadCert" class="go-btn btn-cert">🏆 Descargar Certificado</button>
            <button id="btnRestartGame" class="go-btn btn-restart">Intentar de Nuevo</button>
        </div>

        <div id="ranking-modal" class="modal-screen" style="z-index: 35;">
            <div class="go-title" style="color:#00ffcc;">🏆 TOP 10 MUNDIAL</div>
            <ul id="rankingList"></ul>
            <button id="btnCloseRank" class="go-btn btn-restart">Volver</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyARwzSFBfViQEo2mcVRvieMy2nuUiDYXqs",
            authDomain: "chipa-viajera.firebaseapp.com",
            projectId: "chipa-viajera",
            storageBucket: "chipa-viajera.firebasestorage.app",
            messagingSenderId: "533357296369",
            appId: "1:533357296369:web:97f7f9ad1c5b7664658750"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function registrarJugador() {
            try {
                await db.collection("metadatos").doc("estadisticas").update({
                    totalJugadores: firebase.firestore.FieldValue.increment(1)
                });
            } catch(e) { console.log("Init counter..."); }
        }
        registrarJugador();

        db.collection("metadatos").doc("estadisticas").onSnapshot(doc => {
            if(doc.exists) document.getElementById("playerCount").innerText = doc.data().totalJugadores;
        });
    </script>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d", { alpha: false, desynchronized: true });

        let isPlaying = true; 
        let frameCount = 0;
        let lives = 3;
        let score = 0; 
        let cocidosCount = 0;
        
        let currentLevel = 1;
        let worldSpeed = 4; 
        let spawnRate = 75; 
        
        let serieActual = 1; 
        let idxActual = 0;   
        let idxSiguiente = 1;
        let scrollY = 0; 
        let lanePositions = []; 
        const SPRITE_SIZE = 105; 

        // --- CARGA DE ASSETS CORREGIDA ---
        const escaleras = [new Image(), new Image(), new Image(), new Image(), new Image(), new Image()];
        escaleras[0].src = 'imagenes/Escalera París.png'; escaleras[1].src = 'imagenes/Escalera París1.png';
        escaleras[2].src = 'imagenes/Escalera París2.png'; escaleras[3].src = 'imagenes/Escalera París3.png';
        escaleras[4].src = 'imagenes/Escalera París4.png'; escaleras[5].src = 'imagenes/Escalera París5.png';

        const imgRunD1 = new Image(); imgRunD1.src = 'imagenes/chipa_run_derecha1.png';
        const imgRunD2 = new Image(); imgRunD2.src = 'imagenes/chipa_run_derecha2.png';
        const imgJumpD = new Image(); imgJumpD.src = 'imagenes/chipa_jump_derecha.png';
        const imgRunI1 = new Image(); imgRunI1.src = 'imagenes/chipa_run_izquierda1.png';
        const imgRunI2 = new Image(); imgRunI2.src = 'imagenes/chipa_run_izquierda2.png';
        const imgJumpI = new Image(); imgJumpI.src = 'imagenes/chipa_jump_izquierda.png'; 
        const imgCrash = new Image(); imgCrash.src = 'imagenes/chipa_crash.png'; 

        const maletaAzulA = new Image(); maletaAzulA.src = 'imagenes/Maleta lilaA.png';
        const maletaAzulB = new Image(); maletaAzulB.src = 'imagenes/Maleta lilaB.png';
        
        const maletaRojaA = new Image(); maletaRojaA.src = 'imagenes/Maleta rojaA.png';
        const maletaRojaB = new Image(); maletaRojaB.src = 'imagenes/Maleta rojaB.png';
        const maletaLilaA = new Image(); maletaLilaA.src = 'imagenes/Maleta lilaA.png';
        const maletaLilaB = new Image(); maletaLilaB.src = 'imagenes/Maleta lilaB.png';

        const ancianoBaja1 = new Image(); ancianoBaja1.src = 'imagenes/Ancianos bajando1.png';
        const ancianoBaja2 = new Image(); ancianoBaja2.src = 'imagenes/Ancianos bajando2.png';
        const turistaPesada1 = new Image(); turistaPesada1.src = 'imagenes/Turista_pesada1.png';
        const turistaPesada2 = new Image(); turistaPesada2.src = 'imagenes/Turista_pesada2.png';
        const señoraBajaA = new Image(); señoraBajaA.src = 'imagenes/Señora_bajandoA.png';
        const señoraBajaB = new Image(); señoraBajaB.src = 'imagenes/Señora_bajandoB.png';
        const imgParadaFoto = new Image(); imgParadaFoto.src = 'imagenes/Parada_foto.png';
        const imgTuristaSentado = new Image(); imgTuristaSentado.src = 'imagenes/Turista sentado.png';
        const imgHinchaParaguay = new Image(); imgHinchaParaguay.src = 'imagenes/hincha de Paraguay.png';
        const ancianaBolsasA = new Image(); ancianaBolsasA.src = 'imagenes/Anciana_bolsasA.png';
        const ancianaBolsasB = new Image(); ancianaBolsasB.src = 'imagenes/Anciana_bolsasB.png';
        const empresarioA = new Image(); empresarioA.src = 'imagenes/EmpresarioA.png';
        const empresarioB = new Image(); empresarioB.src = 'imagenes/EmpresarioB.png';
        const turistaSubeA = new Image(); turistaSubeA.src = 'imagenes/Subiendo TuristaA.png';
        const turistaSubeB = new Image(); turistaSubeB.src = 'imagenes/Subiendo TuristaB.png';
        const turistaSubeSoloA = new Image(); turistaSubeSoloA.src = 'imagenes/Turista sube soloA.png'; 
        const turistaSubeSoloB = new Image(); turistaSubeSoloB.src = 'imagenes/Turista sube soloB.png';
        const tazaA = new Image(); tazaA.src = 'imagenes/TazaA.png';
        const tazaB = new Image(); tazaB.src = 'imagenes/TazaB.png';

        const corredoresCarga = [
            { c1: new Image(), c2: new Image() }, { c1: new Image(), c2: new Image() }, { c1: new Image(), c2: new Image() }
        ];
        corredoresCarga[0].c1.src = 'imagenes/Corredor_subu_Corre1.png'; corredoresCarga[0].c2.src = 'imagenes/Corredor_subu_Corre2.png';
        corredoresCarga[1].c1.src = 'imagenes/Corredora_subé_Rojo1.png'; corredoresCarga[1].c2.src = 'imagenes/Corredora_subé_Rojo2.png';
        corredoresCarga[2].c1.src = 'imagenes/Corredora_subu_Corre1.png'; corredoresCarga[2].c2.src = 'imagenes/Corredora_subu_Corre2.png';
        const imgJePasse = new Image(); imgJePasse.src = 'imagenes/Je_passe.png';

        const player = {
            lane: 1, x: 0, y: 0,
            isJumpingHandrail: false, jumpProgress: 0,
            sourceLane: 1, targetLane: 3, stepToggle: 0, facing: 'derecha',
            isCrashing: false, crashTimer: 0
        };

        const obstacles = []; const alerts = []; let obstacleAnimToggle = 0;
        const hudStatsLeftEl = document.getElementById("hud-stats-left");
        const hudCocidosEl = document.getElementById("hud-cocidos");
        const hudLivesEl = document.getElementById("hud-lives");
        let hudStatsLeftCache = ""; let hudCocidosCache = ""; let hudLivesCache = "";

        function resizeCanvas() {
            canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight;
            player.y = canvas.height - 130; 
            let w = canvas.width;
            lanePositions = [w * 0.22, w * 0.38, w * 0.50, w * 0.62, w * 0.78];
            player.x = lanePositions[player.lane];
        }
        
        window.addEventListener('load', () => { 
            resizeCanvas(); 
            precargarAssets().then(() => {
                document.getElementById("loading-screen").style.display = "none";
                showLevelBanner(); loop();
            });
        });
        window.addEventListener('resize', resizeCanvas);

        function precargarAssets() {
            const todasLasImagenes = [...escaleras, imgRunD1, imgRunD2, imgJumpD, imgRunI1, imgRunI2, imgJumpI, imgCrash, maletaAzulA, maletaAzulB, maletaRojaA, maletaRojaB, maletaLilaA, maletaLilaB, ancianoBaja1, ancianoBaja2, turistaPesada1, turistaPesada2, señoraBajaA, señoraBajaB, imgParadaFoto, imgTuristaSentado, imgHinchaParaguay, ancianaBolsasA, ancianaBolsasB, empresarioA, empresarioB, turistaSubeA, turistaSubeB, turistaSubeSoloA, turistaSubeSoloB, tazaA, tazaB, imgJePasse, ...corredoresCarga.flatMap(c => [c.c1, c.c2])];
            const promesas = todasLasImagenes.map(img => new Promise(resolve => {
                if (img.complete && img.naturalWidth > 0) resolve();
                else { img.addEventListener('load', resolve, { once: true }); img.addEventListener('error', resolve, { once: true }); }
            }));
            return Promise.race([Promise.all(promesas), new Promise(r => setTimeout(r, 1500))]);
        }

        function showLevelBanner() {
            const banner = document.getElementById("level-banner");
            banner.innerText = currentLevel > 10 ? `NIVEL ULTRA 🔥` : `NIVEL ${currentLevel}`;
            banner.style.opacity = "1";
            setTimeout(() => { banner.style.opacity = "0"; }, 1800);
        }

        function showGameOverScreen(won = false) {
            isPlaying = false;
            document.getElementById("final-score").innerText = `${score} Puntos / Points`;
            const titleEl = document.getElementById("go-title");
            
            if (won) {
                titleEl.innerHTML = "<span style='color:#00ffcc;'>¡Felicidades! Completaste la subida básica.</span><br><span style='font-size:16px;color:#fff;'>Félicitations! Vous avez terminé la montée de base.</span>";
            } else {
                titleEl.innerHTML = "¡Estuviste a punto de llegar a la cima de la escalera!<br><span style='font-size:15px;color:#aaa;font-weight:normal;'>Tu étais si proche d'atteindre le sommet de l'escalier!</span>";
            }

            actualizarEnlaceWhatsApp();
            document.getElementById("game-over-screen").style.display = "flex";
        }

        function actualizarEnlaceWhatsApp() {
            const nombre = document.getElementById("playerName").value.trim() || "Chipa";
            const textoWA = `¡${nombre} sumó ${score} puntos esquivando turistas en Montmartre con la Chipa Viajera! ¿Podés superarlo? / ${nombre} a obtenu ${score} points à Montmartre! Peux-tu faire mieux? Juntá cocidos acá: https://juanterere.github.io/Chipa_Viajera_Montmartre/`;
            document.getElementById("btnShareWA").href = `https://api.whatsapp.com/send?text=${encodeURIComponent(textoWA)}`;
        }
        document.getElementById("playerName").addEventListener("input", actualizarEnlaceWhatsApp);

        document.getElementById("btnSaveRank").addEventListener("click", async () => {
            const nombre = document.getElementById("playerName").value.trim() || "Anónimo";
            const pais = document.getElementById("playerCountry").value;
            
            try {
                document.getElementById("btnSaveRank").innerText = "Guardando...";
                await db.collection("ranking").add({
                    nombre: nombre,
                    puntos: score,
                    bandera: pais,
                    fecha: new Date().toISOString()
                });
                document.getElementById("btnSaveRank").style.display = "none";
                abrirPanelRanking();
            } catch(e) { alert("Error de conexión"); }
        });

        async function abrirPanelRanking() {
            const lista = document.getElementById("rankingList");
            lista.innerHTML = "<li style='justify-content:center;color:#888;'>Cargando TOP 10...</li>";
            document.getElementById("ranking-modal").style.display = "flex";

            try {
                const snapshot = await db.collection("ranking").orderBy("puntos", "desc").limit(10).get();
                lista.innerHTML = "";
                let i = 1;
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const medalla = i === 1 ? "🥇 " : i === 2 ? "🥈 " : i === 3 ? "🥉 " : `${i}. `;
                    lista.innerHTML += `
                        <li>
                            <div class="rank-item-left">
                                <span class="rank-pos">${medalla}</span>
                                <span>${data.bandera || '🌍'}</span>
                                <span>${data.nombre}</span>
                            </div>
                            <span class="rank-pts">${data.puntos} pts</span>
                        </li>`;
                    i++;
                });
            } catch(e) { lista.innerHTML = "<li>Error al cargar ranking</li>"; }
        }

        document.getElementById("btnCloseRank").addEventListener("click", () => {
            document.getElementById("ranking-modal").style.display = "none";
        });
        document.getElementById("btnRestartGame").addEventListener("click", () => window.location.reload());

        document.getElementById("btnDownloadCert").addEventListener("click", () => {
            const nombreCert = document.getElementById("playerName").value.trim() || "Viajero";
            const certImg = new Image();
            certImg.crossOrigin = "anonymous";
            certImg.src = "imagenes/Certificado de puntos_Montmartre.jpg"; 
            certImg.onload = function() {
                const c = document.createElement("canvas");
                c.width = certImg.naturalWidth; c.height = certImg.naturalHeight;
                const cx = c.getContext("2d");
                cx.drawImage(certImg, 0, 0);
                cx.fillStyle = "#111111"; cx.font = `bold ${c.width * 0.045}px sans-serif`; cx.textAlign = "center";
                
                cx.fillText(nombreCert.toUpperCase(), c.width * 0.5, c.height * 0.75);
                
                cx.fillStyle = "#d35400"; cx.font = `bold ${c.width * 0.055}px Impact, sans-serif`;
                cx.fillText(`${score} PUNTOS`, c.width * 0.5, c.height * 0.85);
                
                const link = document.createElement("a");
                link.href = c.toDataURL("image/jpeg", 0.95);
                link.download = `Certificado_Montmartre_${nombreCert}.jpg`; link.click();
            };
        });

        function handleInput(direction) {
            if (!isPlaying || player.isJumpingHandrail || player.isCrashing) return;
            if (direction === 'left') {
                player.facing = 'izquierda';
                if (player.lane === 3) { player.isJumpingHandrail = true; player.sourceLane = 3; player.targetLane = 1; player.jumpProgress = 0; }
                else if (player.lane === 1) player.lane = 0; else if (player.lane === 4) player.lane = 3;
            } else if (direction === 'right') {
                player.facing = 'derecha';
                if (player.lane === 1) { player.isJumpingHandrail = true; player.sourceLane = 1; player.targetLane = 3; player.jumpProgress = 0; }
                else if (player.lane === 0) player.lane = 1; else if (player.lane === 3) player.lane = 4;
            }
        }

        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft") handleInput('left');
            if (e.key === "ArrowRight") handleInput('right');
        });
        canvas.addEventListener("touchstart", (e) => {
            e.preventDefault();
            const touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
            if (touchX < canvas.width / 2) handleInput('left'); else handleInput('right');
        }, { passive: false });

        function triggerCrash() { player.isCrashing = true; player.crashTimer = 60; lives--; }

        function checkLevelProgression() {
            currentLevel++; 
            if (currentLevel > 10) {
                worldSpeed *= 1.15; 
                spawnRate = Math.max(20, Math.floor(spawnRate * 0.75));
            } else {
                worldSpeed += 0.8; 
                spawnRate = Math.max(35, spawnRate - 6);
            }
            serieActual = 1; score += 500; showLevelBanner();
        }

        function spawnObstacles() {
            if (player.isCrashing) return;
            if (frameCount % spawnRate === 0) {
                const validLanes = [0, 1, 3, 4];
                const selectedLane = validLanes[Math.floor(Math.random() * validLanes.length)];
                const rand = Math.random();

                if (rand < 0.08) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'cocido', width: SPRITE_SIZE * 0.70, speed: worldSpeed }); } 
                else if (rand < 0.20) {
                    let color = Math.random() > 0.66 ? 'roja' : Math.random() > 0.33 ? 'lila' : 'azul';
                    obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'maleta', variant: color, width: SPRITE_SIZE * 0.85, speed: worldSpeed * 1.1 });
                } 
                else if (rand < 0.29) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'anciano', width: SPRITE_SIZE * 1.25, speed: worldSpeed * 1.12 }); }
                else if (rand < 0.38) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'turista_pesada', width: SPRITE_SIZE * 1.25, speed: worldSpeed * 0.4 }); }
                else if (rand < 0.47) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'señora', width: SPRITE_SIZE * 1.25, speed: worldSpeed * 1.1 }); }
                else if (rand < 0.56) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'anciana_bolsas', width: SPRITE_SIZE * 0.95, speed: worldSpeed * 0.35 }); }
                else if (rand < 0.64) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'empresario', width: SPRITE_SIZE * 1.25, speed: worldSpeed * 1.15 }); }
                else if (rand < 0.70) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'parada_foto', width: SPRITE_SIZE * 1.25, speed: worldSpeed }); }
                else if (rand < 0.82) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'hincha_paraguay', width: SPRITE_SIZE * 0.9, speed: worldSpeed }); }
                else if (rand < 0.88) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'turista_sube', width: SPRITE_SIZE * 1.25, speed: worldSpeed * 0.65 }); }
                else if (rand < 0.94) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'turista_sube_solo', width: SPRITE_SIZE * 1.25, speed: worldSpeed * 0.85 }); }
                else { if (!alerts.some(a => a.lane === selectedLane)) alerts.push({ lane: selectedLane, x: lanePositions[selectedLane], y: canvas.height - 80, duration: 85 }); }
            }
        }

        function aplicarIAEsquive() {
            for (let i = 0; i < obstacles.length; i++) {
                let obsA = obstacles[i];
                if (obsA.type === 'parada_foto' || obsA.type === 'turista_sentado' || obsA.type === 'cocido' || obsA.type === 'hincha_paraguay') continue; 
                for (let j = 0; j < obstacles.length; j++) {
                    if (i === j) continue;
                    let obsB = obstacles[j];
                    if (obsA.lane === obsB.lane && Math.abs(obsA.y - obsB.y) < 115) {
                        let carrilAlt = obsA.lane === 0 ? 1 : obsA.lane === 1 ? 0 : obsA.lane === 3 ? 4 : 3;
                        let libre = true;
                        for(let k = 0; k < obstacles.length; k++) {
                            if (obstacles[k].lane === carrilAlt && Math.abs(obstacles[k].y - obsA.y) < 120) { libre = false; break; }
                        }
                        if (libre) { obsA.lane = carrilAlt; obsA.targetX = lanePositions[carrilAlt]; }
                    }
                }
            }
        }

        function drawImageSafely(img, x, y, baseWidth) {
            if (img && img.complete && img.naturalWidth > 0) {
                if (!img.aspectRatio) img.aspectRatio = img.naturalWidth / img.naturalHeight;
                let targetWidth = baseWidth;
                let targetHeight = baseWidth / img.aspectRatio;

                const MAX_HEIGHT = 115; 
                if (targetHeight > MAX_HEIGHT) {
                    targetHeight = MAX_HEIGHT;
                    targetWidth = targetHeight * img.aspectRatio;
                }

                ctx.drawImage(img, x - (targetWidth / 2), y - (targetHeight / 2), targetWidth, targetHeight);
            } else { 
                ctx.fillStyle = "rgba(255, 0, 128, 0.4)"; 
                ctx.fillRect(x - (baseWidth / 2), y - (baseWidth / 2), baseWidth, baseWidth); 
            }
        }

        function loop() {
            if (!isPlaying) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            frameCount++;

            if (frameCount % 8 === 0) player.stepToggle = player.stepToggle === 0 ? 1 : 0;
            if (frameCount % 14 === 0) obstacleAnimToggle = obstacleAnimToggle === 0 ? 1 : 0;
            if (frameCount % 30 === 0 && !player.isCrashing) score += 5;

            if (player.isCrashing) {
                player.crashTimer--;
                if (player.crashTimer <= 0) {
                    player.isCrashing = false;
                    if (lives <= 0) { showGameOverScreen(false); return; }
                }
            }

            if (!player.isCrashing) scrollY += worldSpeed;

            if (scrollY >= canvas.height) {
                scrollY = 0; idxActual = idxSiguiente; idxSiguiente = (idxSiguiente + 1) % escaleras.length;
                if (idxSiguiente === 0) {
                    if (serieActual === 1) serieActual = 2;
                    else checkLevelProgression();
                }
            }

            if (escaleras[idxActual]?.complete) ctx.drawImage(escaleras[idxActual], 0, scrollY, canvas.width, canvas.height);
            if (escaleras[idxSiguiente]?.complete) ctx.drawImage(escaleras[idxSiguiente], 0, scrollY - canvas.height, canvas.width, canvas.height);

            const lvlText = currentLevel > 10 ? `Nivel: ULTRA 🔥 | Pts: ${score}` : `Nivel: ${currentLevel}/10 🗼 | Pts: ${score}`;
            if (lvlText !== hudStatsLeftCache) { hudStatsLeftCache = lvlText; hudStatsLeftEl.innerText = lvlText; }
            const cocText = `☕ ${cocidosCount}/10`;
            if (cocText !== hudCocidosCache) { hudCocidosCache = cocText; hudCocidosEl.innerText = cocText; }
            const livText = `❤️ x${lives}`;
            if (livText !== hudLivesCache) { hudLivesCache = livText; hudLivesEl.innerText = livText; }

            for (let i = alerts.length - 1; i >= 0; i--) {
                let al = alerts[i]; if (!player.isCrashing) al.duration--;
                if (imgJePasse?.complete) ctx.drawImage(imgJePasse, lanePositions[al.lane] - 36, al.y, 72, 48);
                if (al.duration <= 0) {
                    obstacles.push({ lane: al.lane, x: lanePositions[al.lane], targetX: lanePositions[al.lane], y: canvas.height + 60, type: 'corredor', variant: Math.floor(Math.random() * 3), width: SPRITE_SIZE * 1.25, speed: -worldSpeed * 1.25 });
                    alerts.splice(i, 1);
                }
            }

            spawnObstacles(); aplicarIAEsquive();

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                if (!player.isCrashing) obs.y += obs.speed;
                obs.x += (obs.targetX - obs.x) * 0.1; 

                let sprite = null;
                if (obs.type === 'cocido') sprite = obstacleAnimToggle === 0 ? tazaA : tazaB;
                else if (obs.type === 'maleta') {
                    sprite = obs.variant === 'azul' ? (obstacleAnimToggle === 0 ? maletaAzulA : maletaAzulB) : obs.variant === 'roja' ? (obstacleAnimToggle === 0 ? maletaRojaA : maletaRojaB) : (obstacleAnimToggle === 0 ? maletaLilaA : maletaLilaB);
                } 
                else if (obs.type === 'anciano') sprite = obstacleAnimToggle === 0 ? ancianoBaja1 : ancianoBaja2;
                else if (obs.type === 'turista_pesada') sprite = obstacleAnimToggle === 0 ? turistaPesada1 : turistaPesada2;
                else if (obs.type === 'señora') sprite = obstacleAnimToggle === 0 ? señoraBajaA : señoraBajaB;
                else if (obs.type === 'anciana_bolsas') sprite = obstacleAnimToggle === 0 ? ancianaBolsasA : ancianaBolsasB;
                else if (obs.type === 'empresario') sprite = obstacleAnimToggle === 0 ? empresarioA : empresarioB;
                else if (obs.type === 'parada_foto') sprite = imgParadaFoto;
                else if (obs.type === 'turista_sentado') sprite = imgTuristaSentado;
                else if (obs.type === 'hincha_paraguay') sprite = imgHinchaParaguay; 
                else if (obs.type === 'turista_sube') sprite = obstacleAnimToggle === 0 ? turistaSubeA : turistaSubeB;
                else if (obs.type === 'turista_sube_solo') sprite = obstacleAnimToggle === 0 ? turistaSubeSoloA : turistaSubeSoloB;
                else if (obs.type === 'corredor') sprite = obstacleAnimToggle === 0 ? corredoresCarga[obs.variant].c1 : corredoresCarga[obs.variant].c2;

                drawImageSafely(sprite, obs.x, obs.y, obs.width);

                if (!obs.hasCrashed && !player.isJumpingHandrail && !player.isCrashing && obs.lane === player.lane) {
                    if (Math.abs(obs.y - player.y) < 42) {
                        if (obs.type === 'cocido') {
                            score += 100; cocidosCount++;
                            if (cocidosCount >= 10) { cocidosCount = 0; lives++; }
                            obstacles.splice(i, 1); continue;
                        } else { triggerCrash(); obs.hasCrashed = true; continue; }
                    }
                }
                if (obs.y > canvas.height + 80 || obs.y < -80) obstacles.splice(i, 1);
            }

            if (player.isCrashing) {
                if (imgCrash?.complete) drawImageSafely(imgCrash, player.x, player.y, 57);
            } else if (player.isJumpingHandrail) {
                player.jumpProgress += 0.08;
                player.x = lanePositions[player.sourceLane] + (lanePositions[player.targetLane] - lanePositions[player.sourceLane]) * player.jumpProgress;
                let jH = Math.sin(player.jumpProgress * Math.PI) * 65;
                let jImg = player.facing === 'derecha' ? imgJumpD : imgJumpI;
                if (jImg?.complete) drawImageSafely(jImg, player.x, player.y - jH, 57);
                if (player.jumpProgress >= 1) { player.lane = player.targetLane; player.x = lanePositions[player.lane]; player.isJumpingHandrail = false; }
            } else {
                player.x += (lanePositions[player.lane] - player.x) * 0.3;
                let rImg = player.facing === 'derecha' ? (player.stepToggle === 0 ? imgRunD1 : imgRunD2) : (player.stepToggle === 0 ? imgRunI1 : imgRunI2);
                if (rImg?.complete) drawImageSafely(rImg, player.x, player.y, 57);
            }

            requestAnimationFrame(loop);
        }
    </script>
